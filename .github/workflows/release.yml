name: Build and package Stadia X

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release/package version"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-bridge:
    name: Build Linux bridge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build stadia_bridge
        run: |
          mkdir -p artifacts/linux
          bash build/build-linux-bridge.sh "$PWD/artifacts/linux/stadia_bridge"

      - name: Upload Linux bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bridge
          path: artifacts/linux/stadia_bridge
          if-no-files-found: error

  package:
    name: Package release ZIP and installer
    runs-on: windows-latest
    needs:
      - build-linux-bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage runtime binaries
        shell: pwsh
        run: |
          Copy-Item -Force artifacts/linux-bridge/stadia_bridge .
          ./build/Download-ViGEmClient.ps1 -OutputDirectory .

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build C# control center
        shell: pwsh
        run: ./build/Build-CSharpControlCenter.ps1 -CopyToRoot

      - name: Resolve package version
        id: package_version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            if (Test-Path VERSION.txt) {
              $version = (Get-Content VERSION.txt -Raw).Trim()
            }
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: ./build/Package-Release.ps1 -Version "${{ steps.package_version.outputs.version }}"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer EXE
        shell: pwsh
        run: ./build/Build-Installer.ps1 -Version "${{ steps.package_version.outputs.version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stadia-X-package
          path: |
            dist/*.zip
            dist/*.sha256
            dist/*.exe
            dist/*.exe.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.package_version.outputs.version }}"
          $assets = @(
            Get-ChildItem -Path dist -Filter "*.zip"
            Get-ChildItem -Path dist -Filter "*.sha256"
            Get-ChildItem -Path dist -Filter "*.exe"
            Get-ChildItem -Path dist -Filter "*.exe.sha256"
          ) | Where-Object { $_ -and $_.PSIsContainer -eq $false } | Select-Object -ExpandProperty FullName -Unique
          if ($assets.Count -eq 0) {
            throw "No release assets found under dist/."
          }

          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            $ghArgs = @("release", "upload", $tag) + $assets + @("--repo", "${{ github.repository }}", "--clobber")
            & gh @ghArgs
          } else {
            $ghArgs = @("release", "create", $tag) + $assets + @("--repo", "${{ github.repository }}", "--target", "${{ github.sha }}", "--title", $tag, "--generate-notes", "--latest")
            & gh @ghArgs
          }
